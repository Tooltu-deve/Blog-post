server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Health check for ALB — returns tiny JSON, no disk I/O
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # SPA fallback — serve real files first, then index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite hashes filenames so cache busting is automatic
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
