name: Deploy Backend

on:
  push:
    branches: [main]
    paths: [backend/**]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/blog-dev-backend
  ECS_CLUSTER: blog-dev-cluster
  ECS_SERVICE: blog-dev-backend
  TASK_FAMILY: blog-dev-backend
  CODEDEPLOY_APP: blog-dev-deploy
  CODEDEPLOY_DG: blog-dev-backend-dg
  CONTAINER_NAME: blog-dev-backend
  CONTAINER_PORT: "3000"

jobs:
  deploy:
    name: Build, Migrate & Deploy
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run tests
        run: |
          cd backend
          npm ci
          npx prisma generate
          npm test

      - name: Build & push Docker image (ARM64 native)
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPO:$IMAGE_TAG backend/
          docker push $ECR_REPO:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # ── Register New Task Definition ────────────────────────
      # Must happen BEFORE migration so the migration task uses the
      # new image (tagged with git SHA), not the stale `:latest` tag
      # from the initial Terraform-created task definition.
      - name: Register new task definition
        id: task-def
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_FAMILY \
            --query 'taskDefinition')

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$ECR_REPO:$IMAGE_TAG" \
            --arg NAME "$CONTAINER_NAME" \
            '.containerDefinitions |= map(if .name == $NAME then .image = $IMAGE else . end) |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_TASK_DEF_ARN=$NEW_ARN" >> $GITHUB_ENV
          echo "New task definition: $NEW_ARN"

      # ── Database Migration (ECS Run Task) ───────────────────
      - name: Run Prisma migrations
        run: |
          # Reuse network config from the running service (same subnets + SGs)
          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Run migration against the NEW task definition (uses :<sha> image)
          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition $NEW_TASK_DEF_ARN \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{
              "containerOverrides": [{
                "name": "'"$CONTAINER_NAME"'",
                "command": ["npx", "prisma", "migrate", "deploy"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          # Wait for migration to complete
          aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks $TASK_ARN

          # Fetch full task details while still available (ECS prunes stopped tasks after ~1h)
          TASK_DETAIL=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN \
            --output json)

          EXIT_CODE=$(echo "$TASK_DETAIL" | jq -r '.tasks[0].containers[0].exitCode // "None"')
          STOPPED_REASON=$(echo "$TASK_DETAIL" | jq -r '.tasks[0].stoppedReason // "unknown"')
          STOP_CODE=$(echo "$TASK_DETAIL" | jq -r '.tasks[0].stopCode // "unknown"')
          CONTAINER_REASON=$(echo "$TASK_DETAIL" | jq -r '.tasks[0].containers[0].reason // "none"')

          echo "::group::Migration task result"
          echo "Exit code:         $EXIT_CODE"
          echo "Stop code:         $STOP_CODE"
          echo "Stopped reason:    $STOPPED_REASON"
          echo "Container reason:  $CONTAINER_REASON"
          echo "::endgroup::"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed — see details above"
            # Print last 50 log lines for debugging (if log stream exists)
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            LOG_STREAM="ecs/$CONTAINER_NAME/$TASK_ID"
            echo "::group::CloudWatch logs (stream: $LOG_STREAM)"
            aws logs get-log-events \
              --log-group-name /ecs/blog-dev-backend \
              --log-stream-name "$LOG_STREAM" \
              --region $AWS_REGION \
              --limit 50 \
              --query 'events[*].message' --output text 2>&1 || echo "No logs available"
            echo "::endgroup::"
            exit 1
          fi

          echo "Migration completed successfully"

      # ── Blue/Green Deployment via CodeDeploy ────────────────
      - name: Create CodeDeploy deployment
        run: |
          # Generate AppSpec
          APPSPEC=$(cat <<EOF
          {
            "version": 0.0,
            "Resources": [{
              "TargetService": {
                "Type": "AWS::ECS::Service",
                "Properties": {
                  "TaskDefinition": "$NEW_TASK_DEF_ARN",
                  "LoadBalancerInfo": {
                    "ContainerName": "$CONTAINER_NAME",
                    "ContainerPort": $CONTAINER_PORT
                  }
                }
              }
            }]
          }
          EOF
          )

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name $CODEDEPLOY_DG \
            --revision "{
              \"revisionType\": \"AppSpecContent\",
              \"appSpecContent\": {
                \"content\": $(echo "$APPSPEC" | jq -Rs .)
              }
            }" \
            --query 'deploymentId' \
            --output text)

          echo "Deployment started: $DEPLOYMENT_ID"

          # Wait for deployment to complete
          aws deploy wait deployment-successful --deployment-id $DEPLOYMENT_ID
          echo "Deployment completed successfully"
